services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: boson
      POSTGRES_PASSWORD: boson
      POSTGRES_DB: boson
    ports:
      - "5432:5432"
    volumes:
      - todo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boson"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  todo_postgres:
