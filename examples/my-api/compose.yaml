services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: boson
      POSTGRES_PASSWORD: boson
      POSTGRES_DB: boson
    ports:
      - "5432:5432"
    volumes:
      - my_api_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boson"]
      interval: 3s
      timeout: 3s
      retries: 10

  dashboard:
    image: ghcr.io/systograms/boson-dashboard:0.1.0
    environment:
      BOSON_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  my_api_postgres:
