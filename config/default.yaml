app:
  name: boson
  environment: development

http:
  host: 0.0.0.0
  port: 8080

database:
  url: postgres://boson:boson@localhost:5432/boson
  max_connections: 10
  connect_on_boot: false
  run_migrations: false

telemetry:
  log_level: info
  json: false

admin:
  bootstrap_token: ""

auth:
  issuer: boson
  jwt_secret: ""
  access_ttl_seconds: 900
  refresh_ttl_days: 30

storage:
  provider: local
  local_root: data/storage
  public_base_url: ""

queue:
  provider: postgres
  poll_interval_ms: 1000
  batch_size: 25
  visibility_timeout_seconds: 60
  max_attempts: 5
