app:
  name: boson
  environment: development

http:
  host: 0.0.0.0
  port: 8080

database:
  url: postgres://boson:boson@localhost:5432/boson
  max_connections: 10
  connect_on_boot: false
  run_migrations: false

telemetry:
  log_level: boson_server=debug,boson_worker=debug,tower_http=info
  json: false

# Development only. Override with BOSON__ADMIN__BOOTSTRAP_TOKEN.
admin:
  bootstrap_token: local-development-token

# Development only. Override with BOSON__AUTH__JWT_SECRET.
auth:
  issuer: boson
  jwt_secret: local-development-jwt-secret
  access_ttl_seconds: 900
  refresh_ttl_days: 30

storage:
  provider: local
  local_root: data/storage
  public_base_url: ""

queue:
  provider: postgres
  poll_interval_ms: 1000
  batch_size: 25
  visibility_timeout_seconds: 60
  max_attempts: 5
