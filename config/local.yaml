app:
  name: boson
  environment: development

http:
  host: 0.0.0.0
  port: 8080

database:
  url: postgres://boson:boson@localhost:5432/boson
  max_connections: 10
  connect_on_boot: false
  run_migrations: false

telemetry:
  log_level: boson_server=debug,boson_worker=debug,tower_http=info
  json: false

# Development only. Override with BOSON__ADMIN__BOOTSTRAP_TOKEN.
admin:
  bootstrap_token: local-development-token
